<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Sport">
<meta name="theme-color" content="#0f1117">
<link rel="manifest" href="manifest.json">
<title>Mon Suivi Sport</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f1117;
  --surface: #181c25;
  --surface2: #1e2330;
  --border: rgba(255,255,255,0.07);
  --text: #f0f2f7;
  --muted: #6b7280;
  --hint: #3d4458;

  --bike: #1D9E75;
  --bike-bg: rgba(29,158,117,0.15);
  --upper: #8b85e8;
  --upper-bg: rgba(139,133,232,0.15);
  --lower: #e0714a;
  --lower-bg: rgba(224,113,74,0.15);
  --game: #e0b44a;
  --game-bg: rgba(224,180,74,0.15);

  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  overscroll-behavior: none;
}

#app {
  display: flex;
  flex-direction: column;
  height: 100%;
  padding-top: var(--safe-top);
  padding-bottom: var(--safe-bottom);
  max-width: 430px;
  margin: 0 auto;
}

/* HEADER */
.header {
  padding: 18px 20px 10px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.header-title { font-size: 22px; font-weight: 600; letter-spacing: -0.5px; }
.header-sub { font-size: 12px; color: var(--muted); margin-top: 1px; font-family: 'DM Mono', monospace; }

/* LAST SEEN STRIP */
.strip {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  padding: 0 16px 16px;
  flex-shrink: 0;
}
.strip-card {
  background: var(--surface);
  border-radius: 14px;
  padding: 10px 8px;
  text-align: center;
  border: 0.5px solid var(--border);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
}
.strip-emoji { font-size: 20px; line-height: 1; }
.strip-days { font-size: 11px; font-family: 'DM Mono', monospace; font-weight: 500; }
.strip-label { font-size: 9px; color: var(--muted); line-height: 1.2; }

/* CALENDAR */
.cal-wrap { flex: 1; overflow-y: auto; padding: 0 16px 16px; }
.cal-nav {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 14px;
}
.cal-month { font-size: 16px; font-weight: 500; text-transform: capitalize; }
.nav-btn {
  background: var(--surface);
  border: 0.5px solid var(--border);
  border-radius: 10px;
  width: 36px; height: 36px;
  color: var(--text);
  font-size: 16px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.15s;
}
.nav-btn:active { background: var(--surface2); }

.weekdays {
  display: grid; grid-template-columns: repeat(7, 1fr);
  gap: 3px; margin-bottom: 4px;
}
.wd { text-align: center; font-size: 10px; color: var(--hint); padding: 4px 0; font-family: 'DM Mono', monospace; }

.grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }

.cell {
  aspect-ratio: 1;
  border-radius: 12px;
  border: 0.5px solid var(--border);
  background: var(--surface);
  display: flex; flex-direction: column;
  align-items: center; justify-content: flex-start;
  padding: 5px 2px 3px;
  cursor: pointer;
  transition: transform 0.1s;
  position: relative;
  -webkit-user-select: none; user-select: none;
}
.cell:active { transform: scale(0.93); }
.cell.empty { border: none; background: none; cursor: default; }
.cell.today { border: 1.5px solid rgba(255,255,255,0.25); }
.cell.future { opacity: 0.4; cursor: default; }
.cell.future:active { transform: none; }

.cell-num {
  font-size: 10px; color: var(--muted);
  font-family: 'DM Mono', monospace;
  margin-bottom: 3px; align-self: flex-start; padding-left: 3px;
}
.cell.has-act .cell-num { color: var(--text); font-weight: 500; }

.cell-icons { display: flex; flex-wrap: wrap; gap: 0; justify-content: center; }
.cell-icon { font-size: 13px; line-height: 1.1; }

/* BOTTOM SHEET */
.sheet-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(4px);
  z-index: 100;
  display: none;
  align-items: flex-end;
  animation: fadeIn 0.2s;
}
.sheet-overlay.open { display: flex; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.sheet {
  background: var(--surface);
  border-radius: 24px 24px 0 0;
  padding: 0 20px 20px;
  padding-bottom: calc(20px + var(--safe-bottom));
  width: 100%;
  animation: slideUp 0.25s cubic-bezier(0.32,0.72,0,1);
  border-top: 0.5px solid rgba(255,255,255,0.1);
}
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

.sheet-handle {
  width: 36px; height: 4px;
  background: var(--hint);
  border-radius: 2px;
  margin: 12px auto 20px;
}
.sheet-date {
  font-size: 15px; font-weight: 500; margin-bottom: 18px;
  color: var(--muted); text-align: center;
  font-family: 'DM Mono', monospace;
}
.sheet-acts { display: flex; flex-direction: column; gap: 10px; }
.sheet-act {
  display: flex; align-items: center; justify-content: space-between;
  background: var(--surface2);
  border-radius: 14px;
  padding: 14px 16px;
  cursor: pointer;
  border: 1.5px solid transparent;
  transition: border-color 0.15s, background 0.15s;
}
.sheet-act:active { background: var(--bg); }
.sheet-act.active { border-color: currentColor; }

.act-left { display: flex; align-items: center; gap: 12px; }
.act-emoji { font-size: 24px; }
.act-name { font-size: 15px; font-weight: 500; }
.act-check {
  width: 24px; height: 24px; border-radius: 50%;
  border: 1.5px solid var(--hint);
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; transition: all 0.15s;
}
.sheet-act.active .act-check { border-color: currentColor; background: currentColor; }
.sheet-act.active .act-check::after { content: '✓'; color: #0f1117; font-weight: 700; font-size: 12px; }

.sheet-btn {
  margin-top: 18px;
  width: 100%;
  background: var(--text);
  color: var(--bg);
  border: none;
  border-radius: 14px;
  padding: 15px;
  font-size: 15px;
  font-weight: 600;
  font-family: 'DM Sans', sans-serif;
  cursor: pointer;
  transition: opacity 0.15s;
}
.sheet-btn:active { opacity: 0.8; }

.sheet-cancel {
  margin-top: 8px;
  width: 100%;
  background: transparent;
  color: var(--muted);
  border: none;
  border-radius: 14px;
  padding: 12px;
  font-size: 14px;
  font-family: 'DM Sans', sans-serif;
  cursor: pointer;
}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div>
      <div class="header-title">Mon suivi sport 🏃‍♀️</div>
      <div class="header-sub" id="header-sub">chargement...</div>
    </div>
  </div>

  <div class="strip" id="strip"></div>

  <div class="cal-wrap">
    <div class="cal-nav">
      <button class="nav-btn" id="prev">‹</button>
      <span class="cal-month" id="cal-month"></span>
      <button class="nav-btn" id="next">›</button>
    </div>
    <div class="weekdays">
      <div class="wd">LUN</div><div class="wd">MAR</div><div class="wd">MER</div>
      <div class="wd">JEU</div><div class="wd">VEN</div><div class="wd">SAM</div><div class="wd">DIM</div>
    </div>
    <div class="grid" id="grid"></div>
  </div>
</div>

<!-- Bottom sheet -->
<div class="sheet-overlay" id="overlay">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-date" id="sheet-date"></div>
    <div class="sheet-acts" id="sheet-acts"></div>
    <button class="sheet-btn" id="sheet-save">Enregistrer</button>
    <button class="sheet-cancel" id="sheet-cancel">Annuler</button>
  </div>
</div>

<script>
const ACTS = [
  { key: 'bike',  emoji: '🚴', label: 'Vélo',           color: '#1D9E75', bg: 'rgba(29,158,117,0.18)' },
  { key: 'upper', emoji: '💪', label: 'Haut du corps',  color: '#8b85e8', bg: 'rgba(139,133,232,0.18)' },
  { key: 'lower', emoji: '🦵', label: 'Bas du corps',   color: '#e0714a', bg: 'rgba(224,113,74,0.18)' },
  { key: 'game',  emoji: '🎮', label: 'Jeux vidéo',     color: '#e0b44a', bg: 'rgba(224,180,74,0.18)' },
];

// Load or init data
let DATA = JSON.parse(localStorage.getItem('fitness-data') || '{}');

// Pre-load initial entries
const INITIAL = {
  '2025-04-07': ['bike'], '2025-04-08': ['bike'], '2025-04-09': ['bike'],
  '2025-04-10': ['bike'], '2025-04-11': ['bike'], '2025-04-12': ['bike'],
  '2025-04-13': ['bike'],
  '2025-05-03': ['bike'], '2025-05-08': ['bike'],
  '2025-05-09': ['bike', 'game'],
  '2025-05-12': ['upper'],
  '2025-05-14': ['lower'],
};
let changed = false;
Object.entries(INITIAL).forEach(([k, v]) => { if (!DATA[k]) { DATA[k] = v; changed = true; } });
if (changed) save();

function save() { localStorage.setItem('fitness-data', JSON.stringify(DATA)); }

const today = new Date(); today.setHours(0,0,0,0);
let cur = new Date(today.getFullYear(), today.getMonth(), 1);

function dateKey(y, m, d) {
  return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
}

function lastSeen(key) {
  const dates = Object.entries(DATA)
    .filter(([,a]) => a.includes(key))
    .map(([d]) => new Date(d));
  return dates.length ? new Date(Math.max(...dates)) : null;
}

function daysAgo(d) {
  if (!d) return null;
  return Math.floor((today - d) / 86400000);
}

function renderStrip() {
  const el = document.getElementById('strip');
  el.innerHTML = ACTS.map(a => {
    const d = lastSeen(a.key);
    const n = daysAgo(d);
    const daysStr = n === null ? '—' : n === 0 ? 'auj.' : n === 1 ? 'hier' : `J-${n}`;
    const color = n === null ? '#6b7280' : n <= 2 ? a.color : n <= 7 ? '#e0b44a' : '#e0714a';
    return `<div class="strip-card">
      <div class="strip-emoji">${a.emoji}</div>
      <div class="strip-days" style="color:${color}">${daysStr}</div>
      <div class="strip-label">${a.label.split(' ')[0]}</div>
    </div>`;
  }).join('');

  // Header subtitle
  const sub = document.getElementById('header-sub');
  sub.textContent = today.toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long' });
}

function renderCal() {
  const y = cur.getFullYear(), m = cur.getMonth();
  document.getElementById('cal-month').textContent =
    new Date(y, m, 1).toLocaleDateString('fr-FR', { month: 'long', year: 'numeric' });

  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  const offset = (new Date(y, m, 1).getDay() + 6) % 7;
  const days = new Date(y, m + 1, 0).getDate();

  for (let i = 0; i < offset; i++) {
    const e = document.createElement('div'); e.className = 'cell empty'; grid.appendChild(e);
  }

  for (let d = 1; d <= days; d++) {
    const key = dateKey(y, m, d);
    const acts = DATA[key] || [];
    const dt = new Date(y, m, d); dt.setHours(0,0,0,0);
    const isToday = dt.getTime() === today.getTime();
    const isFuture = dt > today;

    const cell = document.createElement('div');
    let cls = 'cell';
    if (acts.length) cls += ' has-act';
    if (isToday) cls += ' today';
    if (isFuture) cls += ' future';
    cell.className = cls;

    // Background tint for active cells
    if (acts.length) {
      if (acts.length === 1) {
        const a = ACTS.find(x => x.key === acts[0]);
        if (a) cell.style.background = a.bg;
      } else {
        cell.style.background = 'rgba(255,255,255,0.06)';
      }
    }

    cell.innerHTML = `<span class="cell-num">${d}</span>
      <div class="cell-icons">${acts.map(k => {
        const a = ACTS.find(x => x.key === k);
        return a ? `<span class="cell-icon">${a.emoji}</span>` : '';
      }).join('')}</div>`;

    if (!isFuture) {
      cell.addEventListener('click', () => openSheet(key, dt));
    }
    grid.appendChild(cell);
  }
}

// Bottom sheet
let sheetKey = null;
let sheetSelected = new Set();

function openSheet(key, dt) {
  sheetKey = key;
  sheetSelected = new Set(DATA[key] || []);
  document.getElementById('sheet-date').textContent =
    dt.toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long' });
  renderSheetActs();
  document.getElementById('overlay').classList.add('open');
}

function renderSheetActs() {
  document.getElementById('sheet-acts').innerHTML = ACTS.map(a => {
    const on = sheetSelected.has(a.key);
    return `<div class="sheet-act${on ? ' active' : ''}" data-key="${a.key}" style="color:${a.color}">
      <div class="act-left">
        <span class="act-emoji">${a.emoji}</span>
        <span class="act-name">${a.label}</span>
      </div>
      <div class="act-check"></div>
    </div>`;
  }).join('');
  document.querySelectorAll('.sheet-act').forEach(el => {
    el.addEventListener('click', () => {
      const k = el.dataset.key;
      if (sheetSelected.has(k)) sheetSelected.delete(k);
      else sheetSelected.add(k);
      renderSheetActs();
    });
  });
}

function closeSheet() {
  document.getElementById('overlay').classList.remove('open');
  sheetKey = null;
}

document.getElementById('sheet-save').addEventListener('click', () => {
  if (!sheetKey) return;
  if (sheetSelected.size === 0) delete DATA[sheetKey];
  else DATA[sheetKey] = [...sheetSelected];
  save();
  closeSheet();
  renderStrip();
  renderCal();
});

document.getElementById('sheet-cancel').addEventListener('click', closeSheet);
document.getElementById('overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('overlay')) closeSheet();
});

document.getElementById('prev').addEventListener('click', () => { cur.setMonth(cur.getMonth()-1); renderCal(); });
document.getElementById('next').addEventListener('click', () => { cur.setMonth(cur.getMonth()+1); renderCal(); });

// Service worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}

renderStrip();
renderCal();
</script>
</body>
</html>
